name: Deploy to Windows VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Ansible & WinRM dependencies
        run: |
          python3 -m pip install --upgrade pip

          python3 -m pip install \
            ansible \
            pywinrm \
            requests \
            requests-ntlm

          python3 -c "import winrm; print('WinRM Installed Successfully')"

      - name: Verify Ansible
        run: |
          ansible --version
          python3 -m pip list | grep winrm

      - name: Create Inventory
        run: |
          mkdir -p ansible

          cat > ansible/inventory.ini << EOF
          [windows]
          vm ansible_host=${{ secrets.WIN_HOST }}

          [windows:vars]
          ansible_user=${{ secrets.WIN_USER }}
          ansible_password=${{ secrets.WIN_PASSWORD }}
          ansible_connection=winrm
          ansible_port=5985
          ansible_winrm_transport=basic
          ansible_winrm_server_cert_validation=ignore
          EOF

      - name: Run Playbook
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy.yml -vvv
