name: Deploy to Windows VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Ansible & WinRM Dependencies
      run: |
        python3 -m pip install --upgrade pip
        python3 -m pip install pywinrm requests requests-ntlm
    
        python3 -c "import winrm; print('WinRM OK')"
    
        ansible --version
    - name: Verify WinRM Package
      run: |
        python3 -c "import winrm; print('WinRM Installed Successfully')"

    - name: Create Inventory
      run: |
        cat > ansible/inventory.ini << EOF
        [windows]
        vm ansible_host=${{ secrets.WIN_HOST }}

        [windows:vars]
        ansible_user=${{ secrets.WIN_USER }}
        ansible_password=${{ secrets.WIN_PASSWORD }}
        ansible_connection=winrm
        ansible_port=5985
        ansible_winrm_transport=basic
        ansible_winrm_server_cert_validation=ignore
        EOF

    - name: Run Playbook
      env:
       OBJC_DISABLE_INITIALIZE_FORK_SAFETY: YES
      run: |
        python3 -m pip show pywinrm
        ansible-playbook -i ansible/inventory.ini ansible/deploy.yml -vvv
